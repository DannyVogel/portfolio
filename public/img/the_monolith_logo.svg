<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow">
      <stop offset="0%" style="stop-color:rgba(120,40,200,0.6);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(120,40,200,0.1);stop-opacity:1" />
    </radialGradient>
  </defs>
  <rect x="35" y="10" width="30" height="80" fill="url(#grad)" stroke="rgba(120,40,200,0.3)" stroke-width="1"/>
  <circle cx="50" cy="50" r="8" fill="url(#glow)" opacity="0.8">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
  <text x="50" y="55" font-size="20" fill="rgba(120,40,200,0.6)" text-anchor="middle" font-family="Arial, sans-serif">◬</text>
</svg>

